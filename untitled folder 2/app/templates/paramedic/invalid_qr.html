<!-- app/templates/paramedic/invalid_qr.html — Shown when QR code is invalid -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid QR - MediTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="text-center">
    <div style="font-size:5rem;">❌</div>
    <h2 class="fw-bold mt-3">Invalid QR Code</h2>
    <p class="text-muted">This QR code is not valid or has been tampered with.</p>
    <p class="text-muted small">If this is an emergency, contact the patient's emergency contacts directly.</p>
    <a href="/" class="btn btn-outline-light mt-3">Return to MediTrack</a>
</div>
</body>
</html>
