<!-- app/templates/patient/uploads.html — Upload medical reports -->
{% extends "base.html" %}
{% block title %}Upload Report - MediTrack{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-upload me-2 text-warning"></i>Upload Medical Report</h4>
<div class="row justify-content-center">
<div class="col-md-7">
<div class="card">
    <div class="card-body p-4">
        <form method="POST" enctype="multipart/form-data" action="/patient/upload">
            <div class="mb-3">
                <label class="form-label fw-semibold">Select File *</label>
                <input type="file" name="report_file" class="form-control" accept=".pdf,.png,.jpg,.jpeg" required>
                <div class="form-text">Allowed: PDF, PNG, JPG, JPEG (max 10MB)</div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Description (Optional)</label>
                <textarea name="description" class="form-control" rows="3" placeholder="e.g., Blood test report from January 2026"></textarea>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-semibold">
                <i class="bi bi-cloud-upload me-2"></i>Upload Report
            </button>
        </form>
        <div class="alert alert-info mt-3 small">
            <i class="bi bi-wifi-off me-2"></i>Files are saved locally first. They will sync to cloud when internet is available.
        </div>
    </div>
</div>
</div>
</div>
{% endblock %}
