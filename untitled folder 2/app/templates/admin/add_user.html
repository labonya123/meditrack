<!-- app/templates/admin/add_user.html -->
{% extends "base.html" %}
{% block title %}Add User - MediTrack{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<h4 class="fw-bold mb-4"><i class="bi bi-person-plus-fill me-2 text-success"></i>Add Doctor / Paramedic</h4>
<div class="card">
<div class="card-body p-4">
<form method="POST" action="/admin/add-user">
    <div class="mb-3">
        <label class="form-label fw-semibold">Username *</label>
        <input type="text" name="username" class="form-control" required placeholder="e.g., dr_patel">
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Role *</label>
        <select name="role" class="form-select" required>
            <option value="">Select role...</option>
            <option value="doctor">Doctor</option>
            <option value="paramedic">Paramedic</option>
        </select>
    </div>
    <div class="mb-4">
        <label class="form-label fw-semibold">Password *</label>
        <input type="password" name="password" class="form-control" required minlength="6">
    </div>
    <button type="submit" class="btn btn-success w-100">Create Account</button>
    <a href="/admin/users" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
</form>
</div>
</div>
</div>
</div>
{% endblock %}
